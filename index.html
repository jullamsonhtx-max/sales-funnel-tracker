function boom(canvas){
  if(!canvas)return;
  const ctx=canvas.getContext("2d");
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;canvas.style.display="block";
  const COLS=["#00A8E0","#0057B7","#FFD700","#FF6B6B","#51CF66","#CC5DE8","#FF922B","#F06595","#74C0FC"];
  const P=[];
  function burst(ox,oy,n){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,spd=4+Math.random()*15;P.push({x:ox,y:oy,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-Math.random()*8,col:COLS[Math.floor(Math.random()*COLS.length)],sh:["c","r","s"][Math.floor(Math.random()*3)],sz:4+Math.random()*13,life:1,dec:0.005+Math.random()*0.014,rot:Math.random()*Math.PI*2,rs:(Math.random()-.5)*.3,g:.2+Math.random()*.22});}}
  burst(canvas.width/2,canvas.height*.33,230);
  const T=[setTimeout(()=>burst(canvas.width*.04,canvas.height*.5,90),220),setTimeout(()=>burst(canvas.width*.96,canvas.height*.5,90),400),setTimeout(()=>burst(canvas.width*.25,canvas.height*.2,80),620),setTimeout(()=>burst(canvas.width*.75,canvas.height*.2,80),800),setTimeout(()=>burst(canvas.width/2,canvas.height*.1,65),1050)];
  function star(cx,cy,r){ctx.beginPath();for(let i=0;i<5;i++){const a1=(i*4*Math.PI)/5-Math.PI/2,a2=((i*4+2)*Math.PI)/5-Math.PI/2;i===0?ctx.moveTo(cx+r*Math.cos(a1),cy+r*Math.sin(a1)):ctx.lineTo(cx+r*Math.cos(a1),cy+r*Math.sin(a1));ctx.lineTo(cx+r*.42*Math.cos(a2),cy+r*.42*Math.sin(a2));}ctx.closePath();ctx.fill();}
  const t0=Date.now();
  (function frame(){ctx.clearRect(0,0,canvas.width,canvas.height);for(let i=P.length-1;i>=0;i--){const p=P[i];p.x+=p.vx;p.y+=p.vy;p.vy+=p.g;p.vx*=.985;p.rot+=p.rs;p.life-=p.dec;if(p.life<=0){P.splice(i,1);continue;}ctx.save();ctx.globalAlpha=Math.min(1,p.life*1.7);ctx.fillStyle=p.col;ctx.translate(p.x,p.y);ctx.rotate(p.rot);if(p.sh==="c"){ctx.beginPath();ctx.arc(0,0,p.sz/2,0,Math.PI*2);ctx.fill();}else if(p.sh==="r"){ctx.fillRect(-p.sz/2,-p.sz/4,p.sz,p.sz/2);}else{star(0,0,p.sz/2);}ctx.restore();}if(Date.now()-t0<3600||P.length>0)requestAnimationFrame(frame);else{canvas.style.display="none";T.forEach(clearTimeout);}})();
}

// ── D3 Charts ──
function DonutChart({entries}){
  const r=useRef(null);
  useEffect(()=>{
    if(!r.current)return;
    const W=260,H=260,R=105,IR=66;
    const svg=d3.select(r.current).attr("viewBox",`0 0 ${W} ${H}`);
    svg.selectAll("*").remove();
    const g=svg.append("g").attr("transform",`translate(${W/2},${H/2})`);
    const data=STAGES.map(s=>({s,n:entries.filter(e=>e.stage===s).length}));
    const pie=d3.pie().value(d=>d.n||1e-9).sort(null);
    const arc=d3.arc().innerRadius(IR).outerRadius(R);
    g.selectAll("path").data(pie(data)).enter().append("path").attr("d",arc).attr("fill",d=>STAGE_COLORS[d.data.s]).attr("stroke","white").attr("stroke-width",2.5);
    g.append("text").attr("text-anchor","middle").attr("dy","-.25em").attr("font-size","30").attr("font-weight","bold").attr("fill","#1e293b").text(entries.length);
    g.append("text").attr("text-anchor","middle").attr("dy","1.3em").attr("font-size","11").attr("fill","#94a3b8").text("total quotes");
  },[entries]);
  return <svg ref={r} style={{width:"100%",maxWidth:260}}/>;
}
function BarChart({entries}){
  const r=useRef(null);
  useEffect(()=>{
    if(!r.current)return;
    const data=TEAM_MEMBERS.map(m=>({name:m,n:entries.filter(e=>e.name===m).length})).filter(d=>d.n>0);
    if(!data.length)return;
    const mg={t:15,r:15,b:38,l:32},W=420,H=230,iW=W-mg.l-mg.r,iH=H-mg.t-mg.b;
    const svg=d3.select(r.current).attr("viewBox",`0 0 ${W} ${H}`).attr("width","100%");
    svg.selectAll("*").remove();
    const g=svg.append("g").attr("transform",`translate(${mg.l},${mg.t})`);
    const x=d3.scaleBand().domain(data.map(d=>d.name)).range([0,iW]).padding(.38);
    const y=d3.scaleLinear().domain([0,d3.max(data,d=>d.n)||1]).range([iH,0]).nice();
    g.append("g").call(d3.axisLeft(y).ticks(5).tickSize(-iW).tickFormat(()=>"")).call(a=>{a.select(".domain").remove();a.selectAll("line").attr("stroke","#e2e8f0").attr("stroke-dasharray","3,3");});
    g.append("g").attr("transform",`translate(0,${iH})`).call(d3.axisBottom(x).tickSize(0)).call(a=>a.select(".domain").attr("stroke","#e2e8f0")).selectAll("text").attr("font-size",10).attr("fill","#64748b").attr("dy","1.1em");
    g.append("g").call(d3.axisLeft(y).ticks(5).tickFormat(d3.format("d"))).call(a=>a.select(".domain").remove()).selectAll("text").attr("font-size",11).attr("fill","#64748b");
    g.selectAll("rect").data(data).enter().append("rect").attr("x",d=>x(d.name)).attr("y",d=>y(d.n)).attr("width",x.bandwidth()).attr("height",d=>iH-y(d.n)).attr("fill",ATT_BLUE).attr("rx",4);
    g.selectAll(".lbl").data(data).enter().append("text").attr("x",d=>x(d.name)+x.bandwidth()/2).attr("y",d=>y(d.n)-5).attr("text-anchor","middle").attr("font-size",11).attr("font-weight","700").attr("fill","#334155").text(d=>d.n);
  },[entries]);
  return <svg ref={r} style={{width:"100%"}}/>;
}

// ── Install Calendar ──
function InstallCalendar({ installs, onAdd, onDelete }) {
  const today = new Date();
  const [vd, setVd] = useState(new Date(today.getFullYear(), today.getMonth(), 1));
  const [seller, setSeller] = useState("");
  const [type, setType] = useState("Fiber");
  const [date, setDate] = useState("");
  const [err, setErr] = useState("");

  const yr = vd.getFullYear(), mo = vd.getMonth();
  const monthName = vd.toLocaleString("default", { month:"long", year:"numeric" });
  const firstDay = new Date(yr, mo, 1).getDay();
  const daysInMo = new Date(yr, mo+1, 0).getDate();
  const cells = [];
  for(let i=0;i<firstDay;i++) cells.push(null);
  for(let d=1;d<=daysInMo;d++) cells.push(d);
  while(cells.length%7!==0) cells.push(null);

  const ds = d => d ? `${yr}-${String(mo+1).padStart(2,"0")}-${String(d).padStart(2,"0")}` : "";
  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,"0")}-${String(today.getDate()).padStart(2,"0")}`;
  const dayInsts = d => installs.filter(i => i.date === ds(d));

  const handleAdd = async () => {
    if(!seller||!date){setErr("Please select a seller and date.");return;}
    setErr("");
    await onAdd({id:crypto.randomUUID(), seller, type, date, ts:Date.now()});
    setSeller(""); setDate("");
  };

  const monthPfx = `${yr}-${String(mo+1).padStart(2,"0")}`;
  const mInsts = installs.filter(i => i.date.startsWith(monthPfx));
  const fiberM = mInsts.filter(i => i.type==="Fiber");
  const aiaM   = mInsts.filter(i => i.type==="AIA");

  const inp2 = {border:"1px solid #e2e8f0",borderRadius:8,padding:"8px 12px",fontSize:13,outline:"none",background:"white",color:"#1e293b"};

  return (
    <div style={{display:"flex",flexDirection:"column",gap:20}}>

      {/* Header row */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",flexWrap:"wrap",gap:16}}>
        {/* Month nav */}
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <button onClick={()=>setVd(new Date(yr,mo-1,1))} style={{width:34,height:34,borderRadius:8,border:"1px solid #e2e8f0",background:"white",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><ChevLeft size={16}/></button>
          <h2 style={{fontSize:20,fontWeight:800,color:"#0f172a",minWidth:200,textAlign:"center"}}>{monthName}</h2>
          <button onClick={()=>setVd(new Date(yr,mo+1,1))} style={{width:34,height:34,borderRadius:8,border:"1px solid #e2e8f0",background:"white",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><ChevRight size={16}/></button>
          <button onClick={()=>setVd(new Date(today.getFullYear(),today.getMonth(),1))} style={{padding:"6px 14px",borderRadius:8,border:`1px solid ${ATT_BLUE}`,background:"white",color:ATT_BLUE,fontSize:13,fontWeight:600,cursor:"pointer"}}>Today</button>
        </div>

        {/* Legend */}
        <div style={{display:"flex",gap:16}}>
          <div style={{display:"flex",alignItems:"center",gap:6,fontSize:13,fontWeight:600,color:FIBER_COLOR}}>
            <div style={{width:12,height:12,borderRadius:3,background:"#dbeafe",border:`1px solid #93c5fd`}}/>Fiber Install
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6,fontSize:13,fontWeight:600,color:AIA_COLOR}}>
            <div style={{width:12,height:12,borderRadius:3,background:"#d1fae5",border:`1px solid #6ee7b7`}}/>AIA Submission
          </div>
        </div>
      </div>

      {/* Add form card */}
      <div style={{background:"white",borderRadius:16,padding:"18px 24px",border:"1px solid #e2e8f0",boxShadow:"0 1px 6px rgba(0,0,0,0.05)"}}>
        <div style={{fontSize:13,fontWeight:700,color:"#374151",marginBottom:12}}>➕ Add New Entry</div>
        <div style={{display:"flex",gap:10,alignItems:"flex-end",flexWrap:"wrap"}}>
          <div>
            <label style={{display:"block",fontSize:11,fontWeight:600,color:"#64748b",marginBottom:5}}>SELLER</label>
            <select value={seller} onChange={e=>setSeller(e.target.value)} style={{...inp2,minWidth:130}}>
              <option value="">Select seller...</option>
              {TEAM_MEMBERS.map(m=><option key={m} value={m}>{m}</option>)}
            </select>
          </div>
          <div>
            <label style={{display:"block",fontSize:11,fontWeight:600,color:"#64748b",marginBottom:5}}>TYPE</label>
            <select value={type} onChange={e=>setType(e.target.value)} style={{...inp2,minWidth:110}}>
              <option value="Fiber">🔵 Fiber</option>
              <option value="AIA">🟢 AIA</option>
            </select>
          </div>
          <div>
            <label style={{display:"block",fontSize:11,fontWeight:600,color:"#64748b",marginBottom:5}}>
              {type==="Fiber"?"INSTALL DATE":"ORDER SUBMISSION DATE"}
            </label>
            <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={inp2}/>
          </div>
          <button onClick={handleAdd} style={{padding:"8px 20px",borderRadius:8,border:"none",background:`linear-gradient(135deg,${ATT_BLUE},${ATT_DEEP})`,color:"white",fontSize:13,fontWeight:700,cursor:"pointer",boxShadow:"0 2px 8px rgba(0,87,183,0.25)"}}>
            Add to Calendar
          </button>
          {err&&<span style={{color:"#ef4444",fontSize:12}}>{err}</span>}
        </div>
      </div>

      {/* Calendar grid */}
      <div style={{background:"white",borderRadius:16,overflow:"hidden",border:"1px solid #e2e8f0",boxShadow:"0 1px 8px rgba(0,0,0,0.06)"}}>
        {/* Day headers */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",background:`linear-gradient(135deg,${ATT_DEEP},${ATT_BLUE})`}}>
          {["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(d=>(
            <div key={d} style={{padding:"12px 0",textAlign:"center",fontSize:12,fontWeight:700,color:"rgba(255,255,255,0.9)",letterSpacing:0.5}}>{d}</div>
          ))}
        </div>
        {/* Cells */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)"}}>
          {cells.map((day,i)=>{
            const di = day ? dayInsts(day) : [];
            const isToday = day && ds(day)===todayStr;
            const isWeekend = i%7===0||i%7===6;
            return(
              <div key={i} className="cal-cell" style={{
                minHeight:100,padding:"8px",
                borderRight:i%7!==6?"1px solid #f1f5f9":"none",
                borderBottom:"1px solid #f1f5f9",
                background:isToday?"#fef3c7":isWeekend?"#fafafa":"white",
                transition:"background 0.15s",
              }}>
                {day&&(
                  <>
                    <div style={{marginBottom:5,display:"flex",alignItems:"center",justifyContent:"flex-end"}}>
                      <div style={{
                        width:24,height:24,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",
                        fontSize:12,fontWeight:isToday?800:500,
                        background:isToday?ATT_BLUE:"transparent",
                        color:isToday?"white":isWeekend?"#94a3b8":"#374151",
                      }}>{day}</div>
                    </div>
                    <div style={{display:"flex",flexDirection:"column",gap:3}}>
                      {di.map(inst=>(
                        <div key={inst.id} style={{
                          background:inst.type==="Fiber"?"#dbeafe":"#d1fae5",
                          color:inst.type==="Fiber"?FIBER_COLOR:AIA_COLOR,
                          border:`1px solid ${inst.type==="Fiber"?"#93c5fd":"#6ee7b7"}`,
                          borderRadius:6,padding:"3px 7px",fontSize:10,fontWeight:700,
                          display:"flex",justifyContent:"space-between",alignItems:"center",gap:4,
                        }}>
                          <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{inst.seller}</span>

                        </div>
                      ))}
                    </div>
                  </>
                )}
              </div>
            );
          })}
        </div>
      </div>

      {/* Summary tables */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
        {[
          {title:"🔵 Pending Fiber Installs",color:FIBER_COLOR,bg:"#1d4ed8",data:fiberM,label:"Fiber"},
          {title:"🟢 Submitted AIAs",color:AIA_COLOR,bg:"#059669",data:aiaM,label:"AIA"},
        ].map(tbl=>(
          <div key={tbl.label} style={{background:"white",borderRadius:16,overflow:"hidden",border:"1px solid #e2e8f0",boxShadow:"0 1px 6px rgba(0,0,0,0.05)"}}>
            <div style={{background:tbl.bg,padding:"14px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{color:"white",fontWeight:700,fontSize:14}}>{tbl.title}</span>
              <div style={{background:"rgba(255,255,255,0.25)",borderRadius:20,padding:"3px 12px",color:"white",fontSize:13,fontWeight:800}}>{tbl.data.length} total</div>
            </div>
            <table style={{width:"100%",borderCollapse:"collapse"}}>
              <thead>
                <tr style={{background:"#f8fafc"}}>
                  <th style={{padding:"10px 20px",textAlign:"left",fontSize:11,fontWeight:700,color:"#64748b",letterSpacing:0.5}}>SELLER</th>
                  <th style={{padding:"10px 20px",textAlign:"center",fontSize:11,fontWeight:700,color:"#64748b",letterSpacing:0.5}}>COUNT</th>
                </tr>
              </thead>
              <tbody>
                {TEAM_MEMBERS.map(m=>{
                  const cnt=tbl.data.filter(i=>i.seller===m).length;
                  if(!cnt)return null;
                  return(
                    <tr key={m} style={{borderTop:"1px solid #f1f5f9"}}>
                      <td style={{padding:"10px 20px",fontSize:13,color:"#374151",fontWeight:500}}>{m}</td>
                      <td style={{padding:"10px 20px",textAlign:"center"}}>
                        <span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:28,height:28,borderRadius:"50%",background:`${tbl.color}18`,color:tbl.color,fontSize:13,fontWeight:800}}>{cnt}</span>
                      </td>
                    </tr>
                  );
                })}
                {!tbl.data.length&&(
                  <tr><td colSpan={2} style={{padding:"20px",textAlign:"center",color:"#94a3b8",fontSize:13}}>No {tbl.label} entries this month</td></tr>
                )}
                {tbl.data.length>0&&(
                  <tr style={{borderTop:`2px solid ${tbl.color}30`,background:`${tbl.color}08`}}>

                    <td style={{padding:"10px 20px",textAlign:"center",fontSize:14,fontWeight:900,color:tbl.color}}>{tbl.data.length}</td>

            </table>
          </div>
        ))}
      </div>
    </div>
  );

              <button key={t.k} onClick={()=>setTab(t.k)} style={{padding:"10px 16px",border:"none",cursor:"pointer",fontSize:13,fontWeight:600,borderRadius:"8px 8px 0 0",background:tab===t.k?"white":"transparent",color:tab===t.k?ATT_DEEP:"rgba(255,255,255,0.82)",transition:"all 0.15s"}}>
                {t.l}
              </button>
            ))}
          </div>
        </div>
      </header>

      <main style={{maxWidth:1200,margin:"0 auto",padding:"32px 28px 60px"}}>
        {loading&&<div style={{textAlign:"center",color:"#94a3b8",paddingTop:80,fontSize:15}}>Connecting to database...</div>}

        {/* NEW ENTRY */}
        {!loading&&tab==="entry"&&(
          <div style={{maxWidth:520,margin:"0 auto"}}>
            <div style={{...card,padding:36}}>
              <h2 style={{fontSize:20,fontWeight:800,color:"#0f172a",margin:"0 0 26px"}}>New Quote Entry</h2>
              {fOk&&<div style={{marginBottom:18,padding:"12px 16px",background:"#f0fdf4",border:"1px solid #bbf7d0",color:"#166534",borderRadius:12,fontSize:14}}>🎉 Entry saved! Keep crushing it!</div>}
              {fErr&&<div style={{marginBottom:18,padding:"12px 16px",background:"#fef2f2",border:"1px solid #fecaca",color:"#991b1b",borderRadius:12,fontSize:14}}>{fErr}</div>}
              <div style={{display:"flex",flexDirection:"column",gap:20}}>
                <div>
                  <label style={lbl}>Your Name <span style={{color:"#f87171"}}>*</span></label>
                  <select value={fName} onChange={e=>setFName(e.target.value)} style={inp}>
                    <option value="">Select your name...</option>
                    {TEAM_MEMBERS.map(m=><option key={m} value={m}>{m}</option>)}
                  </select>
                </div>
                <div>
                  <label style={{...lbl,display:"flex",alignItems:"center"}}>
                    <span>Quote ID <span style={{color:"#f87171"}}>*</span></span>
                    <a href="https://mst.att.com" target="_blank" rel="noreferrer" style={{marginLeft:10,fontSize:12,color:ATT_BLUE,textDecoration:"underline",fontWeight:400}}>Open MST ↗</a>
                  </label>
                  <input type="text" value={fQuote} onChange={e=>setFQuote(e.target.value)} placeholder="e.g. Q-123456" style={inp}/>
                </div>
                <div>
                  <label style={lbl}>Work Order Number <span style={{color:"#f87171"}}>*</span></label>
                  <input type="text" value={fWO} onChange={e=>setFWO(e.target.value)} placeholder="e.g. WO-789012" style={inp}/>
                </div>
                <div>
                  <label style={lbl}>Customer Bill (PDF) <span style={{color:"#94a3b8",fontWeight:400}}>(optional)</span></label>
                  <div onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)}
                    onDrop={e=>{e.preventDefault();setDrag(false);readPdf(e.dataTransfer.files[0]);}}
                    onClick={()=>document.getElementById("__pdfin__").click()}
                    style={{border:`2px dashed ${drag?ATT_BLUE:"#cbd5e1"}`,borderRadius:14,padding:"22px 16px",textAlign:"center",cursor:"pointer",background:drag?"#f0f9ff":"#f8fafc"}}>
                    <input id="__pdfin__" type="file" accept="application/pdf" style={{display:"none"}} onChange={e=>{readPdf(e.target.files?.[0]);e.target.value="";}}/>
                    {fPdf?(
                      <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,fontSize:13,color:"#059669"}}>
                        <FileText size={15}/><span style={{fontWeight:600}}>{fPdf.name}</span>
                        <button onClick={ev=>{ev.stopPropagation();setFPdf(null);}} style={{background:"none",border:"none",cursor:"pointer",color:"#ef4444",fontSize:17}}>×</button>
                      </div>
                    ):(
                      <div style={{color:"#94a3b8",fontSize:13}}><div style={{fontSize:28,marginBottom:6}}>📄</div>Drop PDF here or <span style={{color:ATT_BLUE,textDecoration:"underline"}}>browse files</span></div>
                    )}
                  </div>
                </div>
                <div>
                  <label style={lbl}>Notes <span style={{color:"#94a3b8",fontWeight:400}}>(optional)</span></label>
                  <textarea value={fNotes} onChange={e=>setFNotes(e.target.value)} placeholder="Any additional context..." rows={3} style={{...inp,resize:"none",lineHeight:1.55}}/>
                </div>
                <button onClick={submit} style={{padding:"14px",borderRadius:12,border:"none",cursor:"pointer",background:`linear-gradient(135deg,${ATT_BLUE},${ATT_DEEP})`,color:"white",fontSize:15,fontWeight:800,boxShadow:"0 4px 18px rgba(0,87,183,0.3)"}}>
                  🚀 Submit Entry
                </button>
              </div>
            </div>
          </div>
        )}

        {/* MY LEADS */}
        {!loading&&tab==="myleads"&&(
          <div>
            {!repUnlocked?(
              <div style={{maxWidth:420,margin:"0 auto"}}>
                <div style={{...card,padding:36}}>
                  <h2 style={{fontSize:20,fontWeight:800,color:"#0f172a",margin:"0 0 6px"}}>My Leads</h2>
                  <p style={{color:"#64748b",fontSize:14,marginBottom:28}}>Select your name and enter your passcode to view your leads.</p>
                  {!selectedRep?(
                    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
                      {TEAM_MEMBERS.map(m=>(
                        <button key={m} onClick={()=>{setSelectedRep(m);setRepPwErr(false);setRepPw("");}}
                          style={{padding:"14px 8px",border:"2px solid #e2e8f0",borderRadius:14,background:"white",cursor:"pointer",fontSize:13,fontWeight:600,color:"#374151",display:"flex",flexDirection:"column",alignItems:"center",gap:8}}
                          onMouseEnter={ev=>{ev.currentTarget.style.borderColor=ATT_BLUE;ev.currentTarget.style.color=ATT_BLUE;}}
                          onMouseLeave={ev=>{ev.currentTarget.style.borderColor="#e2e8f0";ev.currentTarget.style.color="#374151";}}>
                          <div style={{width:36,height:36,borderRadius:"50%",background:`${ATT_BLUE}18`,display:"flex",alignItems:"center",justifyContent:"center"}}><UserIcon size={18} style={{color:ATT_BLUE}}/></div>
                          {m}
                        </button>
                      ))}
                    </div>
                  ):(
                    <div>
                      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:24,padding:"12px 16px",background:"#f0f9ff",borderRadius:12,border:"1px solid #bae6fd"}}>
                        <div style={{width:40,height:40,borderRadius:"50%",background:ATT_BLUE,display:"flex",alignItems:"center",justifyContent:"center"}}><UserIcon size={20} style={{color:"white"}}/></div>
                        <div>
                          <div style={{fontWeight:700,color:"#0f172a",fontSize:15}}>{selectedRep}</div>
                          <button onClick={()=>{setSelectedRep(null);setRepPw("");setRepPwErr(false);}} style={{background:"none",border:"none",cursor:"pointer",color:ATT_BLUE,fontSize:12,padding:0,textDecoration:"underline"}}>Not you? Switch rep</button>
                        </div>
                      </div>
                      <label style={lbl}>Enter your passcode</label>
                      <input type="password" value={repPw} onChange={e=>{setRepPw(e.target.value);setRepPwErr(false);}} onKeyDown={e=>e.key==="Enter"&&unlockRep()} placeholder="Passcode"
                        style={{...inp,textAlign:"center",letterSpacing:4,fontSize:16,marginBottom:10,border:repPwErr?"1px solid #fca5a5":"1px solid #e2e8f0",background:repPwErr?"#fef2f2":"white"}}/>
                      {repPwErr&&<p style={{color:"#ef4444",fontSize:12,marginBottom:10}}>Incorrect passcode. Try again.</p>}
                      <button onClick={unlockRep} style={{width:"100%",padding:"12px",borderRadius:12,border:"none",cursor:"pointer",background:`linear-gradient(135deg,${ATT_BLUE},${ATT_DEEP})`,color:"white",fontSize:15,fontWeight:700}}>View My Leads</button>
                    </div>
                  )}
                </div>
              </div>
            ):(
              <div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
                  <div style={{display:"flex",alignItems:"center",gap:12}}>
                    <div style={{width:44,height:44,borderRadius:"50%",background:`linear-gradient(135deg,${ATT_DEEP},${ATT_BLUE})`,display:"flex",alignItems:"center",justifyContent:"center"}}><UserIcon size={22} style={{color:"white"}}/></div>
                    <div>
                      <h2 style={{fontSize:18,fontWeight:800,color:"#0f172a",margin:0}}>{repUnlocked}'s Leads</h2>
                      <p style={{fontSize:13,color:"#64748b",margin:0}}>{repEntries.length} quote{repEntries.length!==1?"s":""} in pipeline</p>
                    </div>
                  </div>
                  <button onClick={()=>{setRepUnlocked(null);setSelectedRep(null);}} style={{display:"flex",alignItems:"center",gap:6,padding:"8px 16px",border:"1px solid #e2e8f0",borderRadius:10,background:"white",cursor:"pointer",fontSize:13,color:"#64748b",fontWeight:500}}>
                    <LockIcon size={13}/> Lock
                  </button>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:24}}>
                  {[{label:"Total",arr:repEntries,color:ATT_BLUE},{label:"In Progress",arr:repEntries.filter(e=>e.stage==="Proposal"||e.stage==="Negotiating"),color:"#F59E0B"},{label:"Won",arr:repEntries.filter(e=>e.stage==="Won"),color:"#10B981"},{label:"Lost",arr:repEntries.filter(e=>e.stage==="Lost"),color:"#EF4444"}].map(c=>(
                    <div key={c.label} style={{...card,padding:16}}>
                      <div style={{fontSize:13,color:"#64748b",marginBottom:6}}>{c.label}</div>
                      <div style={{fontSize:28,fontWeight:900,color:c.color,lineHeight:1}}>{c.arr.length}</div>
                    </div>
                  ))}
                </div>
                {repEntries.length===0?<div style={{textAlign:"center",color:"#94a3b8",padding:"60px 0",fontSize:15}}>No leads yet — submit your first entry! 🚀</div>:<KanbanBoard entries={repEntries} upd={upd} del={del} showDelete={false}/>}
              </div>
            )}
          </div>
        )}

        {/* DASHBOARD */}
        {!loading&&tab==="dashboard"&&(
          <div style={{display:"flex",flexDirection:"column",gap:24}}>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:16}}>
              {[{label:"Total Quotes",val:total,color:ATT_BLUE,icon:"📋"},{label:"In Progress",val:inProg.length,color:"#F59E0B",icon:"🔄"},{label:"Won",val:wonArr.length,color:"#10B981",icon:"🏆"},{label:"Lost",val:lostN,color:"#EF4444",icon:"❌"}].map(c=>(
                <div key={c.label} style={card}><div style={{fontSize:26,marginBottom:8}}>{c.icon}</div><div style={{fontSize:38,fontWeight:900,color:c.color,lineHeight:1}}>{c.val}</div><div style={{fontSize:13,color:"#64748b",marginTop:7}}>{c.label}</div></div>
              ))}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
              <div style={card}>
                <h3 style={{margin:"0 0 18px",fontSize:15,fontWeight:700,color:"#374151"}}>Pipeline by Stage</h3>
                {!total?<div style={{textAlign:"center",color:"#94a3b8",padding:"48px 0",fontSize:14}}>Add some entries to see the chart</div>:(
                  <div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
                    <DonutChart entries={entries}/>
                    <div style={{display:"flex",flexWrap:"wrap",gap:"8px 18px",marginTop:14,justifyContent:"center"}}>
                      {STAGES.map(s=>(<div key={s} style={{display:"flex",alignItems:"center",gap:6,fontSize:12,color:"#64748b"}}><div style={{width:10,height:10,borderRadius:"50%",background:STAGE_COLORS[s]}}/>{s}: <strong>{entries.filter(e=>e.stage===s).length}</strong></div>))}
                    </div>
                  </div>
                )}
              </div>
              <div style={card}>
                <h3 style={{margin:"0 0 18px",fontSize:15,fontWeight:700,color:"#374151"}}>Quotes per Rep</h3>
                {!total?<div style={{textAlign:"center",color:"#94a3b8",padding:"48px 0",fontSize:14}}>No data yet</div>:<BarChart entries={entries}/>}
              </div>
            </div>
          </div>
        )}

        {/* T-CHART */}
        {!loading&&tab==="tchart"&&<TChart/>}

        {/* INSTALL CALENDAR */}
        {!loading&&tab==="calendar"&&(
          <InstallCalendar
            installs={installs}
            onAdd={async(inst)=>{try{await addInstall(inst);}catch(e){console.error(e);}}}
            onDelete={async(id)=>{try{await delInstall(id);}catch(e){console.error(e);}}}
          />
        )}

        {/* AD VIEW */}
        {!loading&&tab==="adview"&&(
          !adUnlocked?(
            <div style={{maxWidth:300,margin:"64px auto 0",textAlign:"center"}}>
              <div style={{fontSize:54,marginBottom:10}}>🔐</div>
              <h2 style={{fontSize:20,fontWeight:800,color:"#0f172a",margin:"0 0 8px"}}>AD View Access</h2>
              <p style={{color:"#64748b",fontSize:14,lineHeight:1.6,margin:"0 0 26px"}}>Enter your passcode to view the full pipeline.</p>
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                <input type="password" value={adPw} onChange={e=>{setAdPw(e.target.value);setAdPwErr(false);}} onKeyDown={e=>e.key==="Enter"&&unlockAd()} placeholder="Passcode"
                  style={{...inp,textAlign:"center",letterSpacing:4,fontSize:16,border:adPwErr?"1px solid #fca5a5":"1px solid #e2e8f0",background:adPwErr?"#fef2f2":"white"}}/>
                {adPwErr&&<p style={{color:"#ef4444",fontSize:12,margin:0}}>Incorrect passcode.</p>}
                <button onClick={unlockAd} style={{padding:"12px",borderRadius:12,border:"none",cursor:"pointer",background:`linear-gradient(135deg,${ATT_BLUE},${ATT_DEEP})`,color:"white",fontSize:15,fontWeight:700}}>Unlock</button>
              </div>
            </div>
          ):(
            <div>
              <div style={{display:"flex",justifyContent:"flex-end",marginBottom:20}}>
                <button onClick={()=>setAdUnlocked(false)} style={{display:"flex",alignItems:"center",gap:6,padding:"8px 16px",border:"1px solid #e2e8f0",borderRadius:10,background:"white",cursor:"pointer",fontSize:13,color:"#64748b",fontWeight:500}}>
                  <LockIcon size={13}/> Lock
                </button>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:16,marginBottom:28}}>
                {[{label:"Total Pipeline",arr:entries,color:ATT_BLUE,bg:"#eff8ff"},{label:"In Progress",arr:inProg,color:"#F59E0B",bg:"#fffbeb"},{label:"Won",arr:wonArr,color:"#10B981",bg:"#f0fdf4"}].map(c=>(
                  <div key={c.label} style={{...card,background:c.bg}}>
                    <div style={{fontWeight:700,color:"#374151",fontSize:14,marginBottom:16}}>{c.label}</div>
                    <div style={{display:"flex",gap:28}}>
                      {[{icon:<Phone size={17} style={{color:c.color}}/>,val:sumR(c.arr,"voiceLines"),l:"Voice Lines"},{icon:<Wifi size={17} style={{color:c.color}}/>,val:sumR(c.arr,"dataLines"),l:"Data Lines"}].map(r=>(
                        <div key={r.l} style={{display:"flex",alignItems:"center",gap:9}}>{r.icon}<div><div style={{fontSize:26,fontWeight:900,color:c.color,lineHeight:1}}>{r.val}</div><div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>{r.l}</div></div></div>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
              <KanbanBoard entries={entries} upd={upd} del={del} showDelete={true}/>
            </div>
          )
        )}
      </main>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
