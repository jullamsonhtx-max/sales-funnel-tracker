function boom(canvas){
  if(!canvas)return;
  var ctx=canvas.getContext("2d");
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;canvas.style.display="block";
  var COLS=["#00A8E0","#0057B7","#FFD700","#FF6B6B","#51CF66","#CC5DE8","#FF922B","#F06595","#74C0FC"];
  var P=[];
  function burst(ox,oy,n){for(var i=0;i<n;i++){var a=Math.random()*Math.PI*2,spd=4+Math.random()*15;P.push({x:ox,y:oy,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-Math.random()*8,col:COLS[Math.floor(Math.random()*COLS.length)],sh:["c","r","s"][Math.floor(Math.random()*3)],sz:4+Math.random()*13,life:1,dec:0.005+Math.random()*0.014,rot:Math.random()*Math.PI*2,rs:(Math.random()-.5)*.3,g:.2+Math.random()*.22});}}
  burst(canvas.width/2,canvas.height*.33,230);
  var T=[setTimeout(function(){burst(canvas.width*.04,canvas.height*.5,90);},220),setTimeout(function(){burst(canvas.width*.96,canvas.height*.5,90);},400),setTimeout(function(){burst(canvas.width*.25,canvas.height*.2,80);},620),setTimeout(function(){burst(canvas.width*.75,canvas.height*.2,80);},800),setTimeout(function(){burst(canvas.width/2,canvas.height*.1,65);},1050)];
  function star(cx,cy,r){ctx.beginPath();for(var i=0;i<5;i++){var a1=(i*4*Math.PI)/5-Math.PI/2,a2=((i*4+2)*Math.PI)/5-Math.PI/2;i===0?ctx.moveTo(cx+r*Math.cos(a1),cy+r*Math.sin(a1)):ctx.lineTo(cx+r*Math.cos(a1),cy+r*Math.sin(a1));ctx.lineTo(cx+r*.42*Math.cos(a2),cy+r*.42*Math.sin(a2));}ctx.closePath();ctx.fill();}
  var t0=Date.now();
  (function frame(){ctx.clearRect(0,0,canvas.width,canvas.height);for(var i=P.length-1;i>=0;i--){var p=P[i];p.x+=p.vx;p.y+=p.vy;p.vy+=p.g;p.vx*=.985;p.rot+=p.rs;p.life-=p.dec;if(p.life<=0){P.splice(i,1);continue;}ctx.save();ctx.globalAlpha=Math.min(1,p.life*1.7);ctx.fillStyle=p.col;ctx.translate(p.x,p.y);ctx.rotate(p.rot);if(p.sh==="c"){ctx.beginPath();ctx.arc(0,0,p.sz/2,0,Math.PI*2);ctx.fill();}else if(p.sh==="r"){ctx.fillRect(-p.sz/2,-p.sz/4,p.sz,p.sz/2);}else{star(0,0,p.sz/2);}ctx.restore();}if(Date.now()-t0<3600||P.length>0)requestAnimationFrame(frame);else{canvas.style.display="none";T.forEach(clearTimeout);}})();
}
