function boom(canvas) {
  if(!canvas)return;
  const ctx=canvas.getContext("2d");
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;canvas.style.display="block";
  const COLS=["#00A8E0","#0057B7","#FFD700","#FF6B6B","#51CF66","#CC5DE8","#FF922B","#F06595","#74C0FC"];
  const P=[];
  function burst(ox,oy,n){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,spd=4+Math.random()*15;P.push({x:ox,y:oy,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-Math.random()*8,col:COLS[Math.floor(Math.random()*COLS.length)],sh:["c","r","s"][Math.floor(Math.random()*3)],sz:4+Math.random()*13,life:1,dec:0.005+Math.random()*0.014,rot:Math.random()*Math.PI*2,rs:(Math.random()-.5)*.3,g:.2+Math.random()*.22});}}
  burst(canvas.width/2,canvas.height*.33,230);
  const T=[setTimeout(()=>burst(canvas.width*.04,canvas.height*.5,90),220),setTimeout(()=>burst(canvas.width*.96,canvas.height*.5,90),400),setTimeout(()=>burst(canvas.width*.25,canvas.height*.2,80),620),setTimeout(()=>burst(canvas.width*.75,canvas.height*.2,80),800),setTimeout(()=>burst(canvas.width/2,canvas.height*.1,65),1050)];
  function star(cx,cy,r){ctx.beginPath();for(let i=0;i<5;i++){const a1=(i*4*Math.PI)/5-Math.PI/2,a2=((i*4+2)*Math.PI)/5-Math.PI/2;i===0?ctx.moveTo(cx+r*Math.cos(a1),cy+r*Math.sin(a1)):ctx.lineTo(cx+r*Math.cos(a1),cy+r*Math.sin(a1));ctx.lineTo(cx+r*.42*Math.cos(a2),cy+r*.42*Math.sin(a2));}ctx.closePath();ctx.fill();}
  const t0=Date.now();
  (function frame(){ctx.clearRect(0,0,canvas.width,canvas.height);for(let i=P.length-1;i>=0;i--){const p=P[i];p.x+=p.vx;p.y+=p.vy;p.vy+=p.g;p.vx*=.985;p.rot+=p.rs;p.life-=p.dec;if(p.life<=0){P.splice(i,1);continue;}ctx.save();ctx.globalAlpha=Math.min(1,p.life*1.7);ctx.fillStyle=p.col;ctx.translate(p.x,p.y);ctx.rotate(p.rot);if(p.sh==="c"){ctx.beginPath();ctx.arc(0,0,p.sz/2,0,Math.PI*2);ctx.fill();}else if(p.sh==="r"){ctx.fillRect(-p.sz/2,-p.sz/4,p.sz,p.sz/2);}else{star(0,0,p.sz/2);}ctx.restore();}if(Date.now()-t0<3600||P.length>0)requestAnimationFrame(frame);else{canvas.style.display="none";T.forEach(clearTimeout);}})();
}
function DonutChart({entries}){
  const r=useRef(null);
  useEffect(()=>{
    if(!r.current)return;
    const W=260,H=260,R=105,IR=66;
    const svg=d3.select(r.current).attr("viewBox",`0 0 ${W} ${H}`);
    svg.selectAll("*").remove();
    const g=svg.append("g").attr("transform",`translate(${W/2},${H/2})`);
    const data=STAGES.map(s=>({s,n:entries.filter(e=>e.stage===s).length}));
    const pie=d3.pie().value(d=>d.n||1e-9).sort(null);
    const arc=d3.arc().innerRadius(IR).outerRadius(R);
    g.selectAll("path").data(pie(data)).enter().append("path").attr("d",arc).attr("fill",d=>STAGE_COLORS[d.data.s]).attr("stroke","white").attr("stroke-width",2.5);
    g.append("text").attr("text-anchor","middle").attr("dy","-.25em").attr("font-size","30").attr("font-weight","bold").attr("fill","#1e293b").text(entries.length);
    g.append("text").attr("text-anchor","middle").attr("dy","1.3em").attr("font-size","11").attr("fill","#94a3b8").text("total quotes");
  },[entries]);
  return <svg ref={r} style={{width:"100%",maxWidth:260}}/>;
}
function BarChart({entries}){
  const r=useRef(null);
  useEffect(()=>{
    if(!r.current)return;
    const data=TEAM_MEMBERS.map(m=>({name:m,n:entries.filter(e=>e.name===m).length})).filter(d=>d.n>0);
    if(!data.length)return;
    const mg={t:15,r:15,b:38,l:32},W=420,H=230,iW=W-mg.l-mg.r,iH=H-mg.t-mg.b;
    const svg=d3.select(r.current).attr("viewBox",`0 0 ${W} ${H}`).attr("width","100%");
    svg.selectAll("*").remove();
    const g=svg.append("g").attr("transform",`translate(${mg.l},${mg.t})`);
    const x=d3.scaleBand().domain(data.map(d=>d.name)).range([0,iW]).padding(.38);
    const y=d3.scaleLinear().domain([0,d3.max(data,d=>d.n)||1]).range([iH,0]).nice();
    g.append("g").call(d3.axisLeft(y).ticks(5).tickSize(-iW).tickFormat(()=>"")).call(a=>{a.select(".domain").remove();a.selectAll("line").attr("stroke","#e2e8f0").attr("stroke-dasharray","3,3");});
    g.append("g").attr("transform",`translate(0,${iH})`).call(d3.axisBottom(x).tickSize(0)).call(a=>a.select(".domain").attr("stroke","#e2e8f0")).selectAll("text").attr("font-size",11).attr("fill","#64748b").attr("dy","1.1em");
    g.append("g").call(d3.axisLeft(y).ticks(5).tickFormat(d3.format("d"))).call(a=>a.select(".domain").remove()).selectAll("text").attr("font-size",11).attr("fill","#64748b");
    g.selectAll("rect").data(data).enter().append("rect").attr("x",d=>x(d.name)).attr("y",d=>y(d.n)).attr("width",x.bandwidth()).attr("height",d=>iH-y(d.n)).attr("fill",ATT_BLUE).attr("rx",4);
    g.selectAll(".lbl").data(data).enter().append("text").attr("x",d=>x(d.name)+x.bandwidth()/2).attr("y",d=>y(d.n)-5).attr("text-anchor","middle").attr("font-size",11).attr("font-weight","700").attr("fill","#334155").text(d=>d.n);
  },[entries]);
  return <svg ref={r} style={{width:"100%"}}/>;
}

                <input type="password" value={pw} onChange={e=>{setPw(e.target.value);setPwErr(false);}} onKeyDown={e=>e.key==="Enter"&&unlock()} placeholder="Passcode"
                  style={{...inp,textAlign:"center",letterSpacing:4,fontSize:16,border:pwErr?"1px solid #fca5a5":"1px solid #e2e8f0",background:pwErr?"#fef2f2":"white"}}/>
                {pwErr&&<p style={{color:"#ef4444",fontSize:12,margin:0}}>Incorrect passcode.</p>}
                <button onClick={unlock} style={{padding:"12px",borderRadius:12,border:"none",cursor:"pointer",background:`linear-gradient(135deg,${ATT_BLUE},${ATT_DEEP})`,color:"white",fontSize:15,fontWeight:700}}>Unlock</button>
              </div>
            </div>
          ):(
            <div>
              <div style={{display:"flex",justifyContent:"flex-end",marginBottom:20}}>
                <button onClick={()=>setUnlocked(false)} style={{display:"flex",alignItems:"center",gap:6,padding:"8px 16px",border:"1px solid #e2e8f0",borderRadius:10,background:"white",cursor:"pointer",fontSize:13,color:"#64748b",fontWeight:500}}>
                  <LockIcon size={13}/> Lock
                </button>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:16,marginBottom:28}}>
                {[{label:"Total Pipeline",arr:entries,color:ATT_BLUE,bg:"#eff8ff"},{label:"In Progress",arr:inProg,color:"#F59E0B",bg:"#fffbeb"},{label:"Won",arr:wonArr,color:"#10B981",bg:"#f0fdf4"}].map(c=>(
                  <div key={c.label} style={{...card,background:c.bg}}>
                    <div style={{fontWeight:700,color:"#374151",fontSize:14,marginBottom:16}}>{c.label}</div>
                    <div style={{display:"flex",gap:28}}>
                      {[{icon:<Phone size={17} style={{color:c.color}}/>,val:sum(c.arr,"voiceLines"),l:"Voice Lines"},{icon:<Wifi size={17} style={{color:c.color}}/>,val:sum(c.arr,"dataLines"),l:"Data Lines"}].map(r=>(
                        <div key={r.l} style={{display:"flex",alignItems:"center",gap:9}}>
                          {r.icon}
                          <div>
                            <div style={{fontSize:26,fontWeight:900,color:c.color,lineHeight:1}}>{r.val}</div>
                            <div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>{r.l}</div>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14}}>
                {STAGES.map(stage=>{
                  const col=entries.filter(e=>e.stage===stage);
                  return(
                    <div key={stage} style={{display:"flex",flexDirection:"column"}}>
                      <div style={{borderTop:`4px solid ${STAGE_COLORS[stage]}`,background:`${STAGE_COLORS[stage]}14`,borderRadius:"12px 12px 0 0",padding:"12px 14px"}}>
                        <div style={{fontWeight:700,color:"#0f172a",fontSize:14}}>{stage}</div>
                        <div style={{display:"flex",gap:10,marginTop:5,fontSize:11,color:"#64748b"}}>
                          <span style={{display:"flex",alignItems:"center",gap:3}}><Phone size={10}/>{sum(col,"voiceLines")}</span>
                          <span style={{display:"flex",alignItems:"center",gap:3}}><Wifi size={10}/>{sum(col,"dataLines")}</span>
                          <span style={{marginLeft:"auto"}}>{col.length} quote{col.length!==1?"s":""}</span>
                        </div>
                      </div>
                      <div style={{background:"#f1f5f9",borderRadius:"0 0 12px 12px",padding:8,minHeight:80,flexGrow:1,display:"flex",flexDirection:"column",gap:8}}>
                        {!col.length&&<div style={{textAlign:"center",color:"#cbd5e1",fontSize:12,padding:"18px 0"}}>No entries</div>}
                        {col.map(e=>(
                          <div key={e.id} style={{background:"white",borderRadius:12,padding:12,boxShadow:"0 1px 4px rgba(0,0,0,0.05)",border:"1px solid #f1f5f9",display:"flex",flexDirection:"column",gap:9}}>
                            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                              <a href={`https://mst.att.com/quote/${e.quoteId}`} target="_blank" rel="noreferrer" style={{fontSize:13,fontWeight:800,color:ATT_BLUE,textDecoration:"underline"}}>{e.quoteId}</a>
                              <button onClick={()=>del(e.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#e2e8f0",padding:2,display:"flex"}}
                                onMouseEnter={ev=>ev.currentTarget.style.color="#ef4444"} onMouseLeave={ev=>ev.currentTarget.style.color="#e2e8f0"}>
                                <Trash2 size={13}/>
                              </button>
                            </div>
                            <div style={{fontSize:11,color:"#64748b",lineHeight:1.7}}>
                              <div>WO: <span style={{color:"#374151",fontWeight:600}}>{e.workOrder}</span></div>
                              <div>Rep: <span style={{color:"#374151",fontWeight:600}}>{e.name}</span></div>
                            </div>
                            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7}}>
                              {[{f:"voiceLines",icon:<Phone size={9}/>,l:"Voice"},{f:"dataLines",icon:<Wifi size={9}/>,l:"Data"}].map(r=>(
                                <div key={r.f}>
                                  <label style={{fontSize:10,color:"#94a3b8",display:"flex",alignItems:"center",gap:3,marginBottom:3}}>{r.icon}{r.l}</label>
                                  <input type="number" min={0} value={e[r.f]||0} onChange={ev=>upd(e.id,{[r.f]:parseInt(ev.target.value)||0})}
                                    style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:7,padding:"4px 7px",fontSize:12,outline:"none",boxSizing:"border-box"}}/>
                                </div>
                              ))}
                            </div>
                            <div>
                              <label style={{fontSize:10,color:"#94a3b8",display:"block",marginBottom:3}}>Stage</label>
                              <select value={e.stage} onChange={ev=>upd(e.id,{stage:ev.target.value})}
                                style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:7,padding:"5px 7px",fontSize:12,outline:"none",background:"white"}}>
                                {STAGES.map(s=><option key={s} value={s}>{s}</option>)}
                              </select>
                            </div>
                            <div>
                              <label style={{fontSize:10,color:"#94a3b8",display:"block",marginBottom:3}}>Next Steps</label>
                              <textarea value={e.nextSteps||""} rows={2} onChange={ev=>upd(e.id,{nextSteps:ev.target.value})} placeholder="Next steps..."
                                style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:7,padding:"5px 7px",fontSize:11,resize:"none",outline:"none",fontFamily:"inherit",boxSizing:"border-box",lineHeight:1.5}}/>
                            </div>
                            {e.pdfB64&&(
                              <a href={`data:application/pdf;base64,${e.pdfB64}`} download={e.pdfName||"bill.pdf"}
                                style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:ATT_BLUE,textDecoration:"underline"}}>
                                <Download size={11}/>{e.pdfName||"Download PDF"}
                              </a>
                            )}
                          </div>
                        ))}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )
        )}
      </main>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
